# ╔══════════════════════════════════════════════════════════════╗
# ║   SisGFiP — application.properties                          ║
# ║   Ajuste as credenciais antes de rodar                       ║
# ╚══════════════════════════════════════════════════════════════╝

# ── Servidor ──────────────────────────────────────────────────────
server.port=8080
server.servlet.context-path=/api

# ── Banco de Dados MySQL ──────────────────────────────────────────
# Crie o banco antes: CREATE DATABASE sisgfip CHARACTER SET utf8mb4;
spring.datasource.url=jdbc:mysql://localhost:3306/sisgfip?useSSL=false&serverTimezone=America/Sao_Paulo&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=sua_senha_aqui
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Pool de conexões (HikariCP — padrão Spring Boot)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ── JPA / Hibernate ───────────────────────────────────────────────
# update  → mantém dados, atualiza schema (bom para dev)
# create  → recria tabelas a cada start (APAGA dados!)
# validate→ só valida, não altera (produção)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ── Swagger / OpenAPI ─────────────────────────────────────────────
# Acesse: http://localhost:8080/api/swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method

# ── Logging ───────────────────────────────────────────────────────
logging.level.com.sisgfip=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE

# ── JWT (prepare para o futuro) ───────────────────────────────────
# TROQUE por uma chave segura de 256+ bits em produção!
app.jwt.secret=sisgfip-super-secret-key-change-in-production-min256bits
app.jwt.expiration-ms=86400000

# ── Spring Security (desabilitando form login padrão para API) ────
spring.security.user.name=admin
spring.security.user.password=admin123
